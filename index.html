<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- ─── Favicon ─────────────────────────────────────────── -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- ─── Viewport ────────────────────────────────────────── -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ─── Primary SEO ─────────────────────────────────────── -->
    <title>Mohamad Ashraf — Graphic Designer | Brand Identity & Social Media</title>
    <meta
      name="description"
      content="Mohamad Ashraf is a graphic designer based in Egypt specializing in brand identity systems, logo design, and scroll-stopping social media posters for Facebook and Instagram."
    />
    <meta
      name="keywords"
      content="graphic designer, brand identity, logo design, social media posters, visual identity, Egypt, Mohamad Ashraf"
    />
    <meta name="author" content="Mohamad Ashraf" />
    <meta name="robots" content="index, follow" />

    <!-- ─── Canonical ───────────────────────────────────────── -->
    <!-- Replace with your actual deployed URL -->
    <link rel="canonical" href="https://mohamedashraf.design" />

    <!-- ─── Open Graph (Facebook, WhatsApp, LinkedIn) ────────── -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Mohamad Ashraf — Graphic Designer" />
    <meta
      property="og:title"
      content="Mohamad Ashraf — Graphic Designer | Brand Identity & Social Media"
    />
    <meta
      property="og:description"
      content="Designing visual identities that make brands impossible to ignore. Brand identity, logo design, and social media posters based in Egypt."
    />
    <!-- Replace with your actual deployed URL -->
    <meta property="og:url" content="https://mohamedashraf.design" />
    <!--
      Replace /images/og-cover.jpg with a 1200×630px image of your work.
      A great OG image = a branded cover with your name, title, and a project mockup.
    -->
    <meta property="og:image" content="https://mohamedashraf.design/images/og-cover.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Mohamad Ashraf — Graphic Designer portfolio preview" />
    <meta property="og:locale" content="en_US" />

    <!-- ─── Twitter / X Card ────────────────────────────────── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Mohamad Ashraf — Graphic Designer | Brand Identity & Social Media"
    />
    <meta
      name="twitter:description"
      content="Designing visual identities that make brands impossible to ignore. Brand identity, logo design, and social media posters."
    />
    <meta name="twitter:image" content="https://mohamedashraf.design/images/og-cover.jpg" />
    <!-- Add your Twitter/X handle if you have one -->
    <!-- <meta name="twitter:site" content="@yourhandle" /> -->

    <!-- ─── Theme color (browser chrome) ────────────────────── -->
    <meta name="theme-color" content="#faf8f4" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#111112" media="(prefers-color-scheme: dark)" />

    <!-- ─── Fonts ────────────────────────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=Playfair+Display:ital,wght@1,900&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500&display=swap"
      rel="stylesheet"
    />

    <!-- ─── Structured Data (JSON-LD) ───────────────────────── -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "Mohamad Ashraf",
        "jobTitle": "Graphic Designer",
        "description": "Graphic designer specializing in brand identity systems, logo design, and social media posters.",
        "url": "https://mohamedashraf.design",
        "sameAs": [
          "https://behance.net/mohamedashraf5055",
          "https://instagram.com/mohamedashraf_26/",
          "https://linkedin.com/in/mo7amed-ashraf/"
        ],
        "address": {
          "@type": "PostalAddress",
          "addressCountry": "EG"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
